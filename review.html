<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Review · {name}</title>
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Libraries for rendering markdown / math / code (loaded from the internet) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
</head>
<body data-page="review">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-dot"></span><span data-profile="name">My Site</span></a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
      <nav class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
        <a href="reviews.html" data-nav="reviews">Paper Reviews</a>
        <a href="gallery.html" data-nav="gallery">Gallery</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <article class="review-wrap" id="review">
      <p class="notice muted">Loading…</p>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> <span data-profile="name"></span></p>
    </div>
  </footer>

  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/review.js" defer></script>
</body>
</html>
