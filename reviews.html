<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Reviews · {name}</title>
  <meta name="description" content="A collection of paper reviews." />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="reviews">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-dot"></span><span data-profile="name">My Site</span></a>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
      <nav class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
        <a href="reviews.html" data-nav="reviews">Paper Reviews</a>
        <a href="gallery.html" data-nav="gallery">Gallery</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <div class="section-head">
      <h2>Paper Reviews</h2>
      <p>Papers I've read, re-explained in my own words.</p>
    </div>

    <div class="toolbar">
      <label class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="Search by title, author, or tag…" autocomplete="off" />
      </label>
    </div>
    <div class="tagbar" id="tagbar"></div>
    <p id="reviews-count" class="list-count muted"></p>

    <div class="grid" id="reviews-list">
      <p class="notice muted">Loading…</p>
    </div>
    <div id="load-more-wrap" class="center" style="margin-top:24px"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> <span data-profile="name"></span></p>
    </div>
  </footer>

  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/reviews.js" defer></script>
</body>
</html>
